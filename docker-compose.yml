services:
  db:
    image: postgis/postgis:16-3.4
    container_name: refereepoint_db
    environment:
      POSTGRES_DB: refereepoint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - refereepoint_pgdata:/var/lib/postgresql/data
      - ./dublin_venues.gpkg:/data/dublin_venues.gpkg:ro 

volumes:
  refereepoint_pgdata: