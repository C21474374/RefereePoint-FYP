<!DOCTYPE html>
<html>
<head>
    <title>Available Games & Events</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Your color palette -->
    <link rel="stylesheet" href="css/colors.css">

    <!-- Custom styling -->
    <style>
        body {
            background-color: var(--background);
            color: var(--text_primary);
        }

        h2 {
            color: var(--text_secondary);
        }

        .card {
            background-color: var(--dark_gray);
            color: var(--text_primary);
            border: none;
        }

        .btn-secondary {
            background-color: var(--primary_red) !important;
            border: none !important;
            color: var(--text_primary);
        }

        .btn-secondary:hover {
            background-color: var(--secondary_yellow) !important;
            color: #000;
        }

        hr {
            border-color: var(--light_gray);
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/games.js" defer></script>
</head>

<body>

<div class="container py-4">
    <h2 class="fw-bold mb-4">Available Games</h2>

    <div id="gamesList">Loading...</div>

    <hr class="my-4">

    <h2 class="fw-bold mb-3">Events</h2>
    <div id="eventsList">Loading...</div>

    <a href="index.html" class="btn btn-secondary w-100 mt-4 fw-bold">
        Back to Dashboard
    </a>
</div>

</body>
</html>
