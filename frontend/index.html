<!-- Create a simple HTML page to display upcoming games and events for a referee with Bootstrap styling. -->
<!-- Add a navigation bar to the games and events page. -->



<!DOCTYPE html>
<html>
<head>
    <title>Referee Dashboard</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Your Color Palette -->
    <link rel="stylesheet" href="css/colors.css">

    <!-- Custom Overrides -->
    <style>
        body {
            background-color: var(--background);
            color: var(--text_primary);
        }

        .card {
            background-color: var(--dark_gray);
            border: none;
            color: var(--text_primary);
        }

        h2, h4 {
            color: var(--text_secondary);
        }

        .btn-success {
            background-color: var(--primary_red) !important;
            border: none !important;
            color: var(--text_primary);
        }

        .btn-success:hover {
            background-color: var(--secondary_yellow) !important;
            color: #000;
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js" defer></script>
</head>
<nav class="navbar navbar-expand-lg" style="background-color: #1A1A1A;">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="index.html" style="color: #DDCD0D;">
            RefereePoint
        </a>

        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                aria-label="Toggle navigation" style="background-color: #E4E5E6;">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" id="nav-dashboard" href="#" style="color: #ffffff;">
                        Announcements
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" id="nav-games" href="#" style="color: #ffffff;">
                        Learning
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" id="nav-profile" href="games.html" style="color: #ffffff;">
                        Games
                    </a>
                </li>
                                <li class="nav-item">
                    <a class="nav-link" id="nav-profile" href="index.html" style="color: #ffffff;">
                        Dashboard
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<body>

<div class="container py-4">

    <h2 class="fw-bold mb-4">Referee Dashboard</h2>

    <!-- PROFILE SECTION -->
    <div id="profileCard" class="card p-3 mb-4">
        <h4 class="fw-semibold">Your Profile</h4>
        <p>Loading...</p>
    </div>

    <!-- UPCOMING GAMES -->
    <div class="card p-3 mb-4">
        <h4>Upcoming Games</h4>
        <div id="upcomingGames">Loading...</div>
    </div>

    <!-- PAST GAMES -->
    <div class="card p-3 mb-4">
        <h4>Past Games</h4>
        <div id="pastGames">Loading...</div>
    </div>

    <!-- COVER REQUESTS -->
    <div class="card p-3 mb-4">
        <h4>Your Cover Requests</h4>
        <div id="coverRequests">Loading...</div>
    </div>

    <!-- UPLOAD GAME -->
<!-- UPLOAD GAME -->
    <div class="card p-3 mb-4">
        <h4>Upload a Game</h4>

        <form id="uploadGameForm" onsubmit="event.preventDefault(); submitGame();">

            <div class="mb-2">
                <label class="form-label">Home Team</label>
                <select id="teamHome" class="form-control"></select>
            </div>

            <div class="mb-2">
                <label class="form-label">Away Team</label>
                <select id="teamAway" class="form-control"></select>
            </div>

            <div class="mb-2">
                <label class="form-label">Category</label>
                <select id="category" class="form-control"></select>
            </div>

            <div class="mb-2">
                <label class="form-label">Competition</label>
                <select id="competition" class="form-control"></select>
            </div>

            <div class="mb-2">
                <label class="form-label">Location Name</label>
                <input type="text" id="locationName" class="form-control" placeholder="Hall / Court name">
            </div>

            <div class="mb-2">
                <label class="form-label">Date</label>
                <input type="date" id="gameDate" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Time</label>
                <input type="time" id="gameTime" class="form-control">
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold">
                Upload Game
            </button>
        </form>
    </div>



    <!-- EVENTS -->
    <div class="card p-3 mb-4">
        <h4>Tournaments / Events</h4>
        <div id="eventsList">Loading...</div>
    </div>

    <a class="btn btn-success w-100 fw-bold" href="games.html">
        View Available Games & Events
    </a>

</div>
</body>
</html>
